name: mymovieapp

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1      # Core de Riverpod
  riverpod_annotation: ^2.6.1   # Annotations para code gen (opcional)
  dio: ^5.7.0                   # HTTP client
  freezed_annotation: ^2.4.4    # Modelos inmutables
  json_annotation: ^4.9.0       # JSON serialization
  go_router: ^14.6.2            # Routing declarativo

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13         # Code generation
  freezed: ^2.5.7               # Freezed generator
  json_serializable: ^6.8.0     # JSON generator
  riverpod_generator: ^2.6.2    # Riverpod code gen (opcional)
